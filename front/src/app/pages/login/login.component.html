<div class="login-container">
  <mat-card class="login-card">
    <h1>Connexion</h1>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Login</mat-label>
        <input matInput formControlName="login" data-cy="login-input" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Mot de passe</mat-label>
        <input matInput type="password" formControlName="password" data-cy="password-input" />
      </mat-form-field>

      <p class="error" *ngIf="errorMessage" data-cy="login-error">{{ errorMessage }}</p>

      <button mat-raised-button color="primary" type="submit" data-cy="login-submit">
        Se connecter
      </button>
    </form>
  </mat-card>
</div>
